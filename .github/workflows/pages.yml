name: pages
# Build and deploy the public project website to GitHub Pages: the static landing
# page in `site/` plus the technical docs rendered from `docs/*.md` into `/docs`.
# Uses the built-in GITHUB_TOKEN.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "docs/**"
      - "scripts/build-docs.ts"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Assemble site (landing + rendered docs)
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp -r site/. _site/
          # Render docs/*.md straight into the published /docs (dependency-free; no install).
          bun run scripts/build-docs.ts --out _site/docs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
